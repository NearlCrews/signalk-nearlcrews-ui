name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          curl --fail --location --proto '=https' --tlsv1.2 --output "$archive" "$url"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" actionlint
      - name: Validate workflows
        run: ./actionlint -color

  validate:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [22.22.2, 24.15.0, 26]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Set up npm
        env:
          NPM_CONFIG_PREFIX: ${{ runner.temp }}/npm-global
        run: |
          npm install --global npm@12.0.1
          echo "${NPM_CONFIG_PREFIX}/bin" >> "$GITHUB_PATH"
          "${NPM_CONFIG_PREFIX}/bin/npm" --version
      - name: Cache npm downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.node }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.node }}-
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Validate package
        run: npm run validate

  windows-package:
    name: Windows package validation
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          package-manager-cache: false
      - name: Set up npm
        shell: pwsh
        run: |
          $npmPrefix = Join-Path $env:RUNNER_TEMP "npm-global"
          npm install --global npm@12.0.1 --prefix $npmPrefix
          $npmPrefix | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $npmPrefix "npm.cmd") --version
      - name: Cache npm downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: windows-npm-24.15.0-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            windows-npm-24.15.0-
            windows-npm-
      - name: Install dependencies
        run: npm ci
      - name: Validate package
        run: npm run test:package

  browser:
    name: Browser tests (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: ubuntu-24.04
            snapshot_variant: ubuntu24-x64
          - architecture: arm64
            runner: ubuntu-24.04-arm
            snapshot_variant: ubuntu24-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Set up npm
        env:
          NPM_CONFIG_PREFIX: ${{ runner.temp }}/npm-global
        run: |
          npm install --global npm@12.0.1
          echo "${NPM_CONFIG_PREFIX}/bin" >> "$GITHUB_PATH"
          "${NPM_CONFIG_PREFIX}/bin/npm" --version
      - name: Cache npm downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ matrix.architecture }}-npm-24-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.architecture }}-npm-24-
            ${{ runner.os }}-${{ matrix.architecture }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Install browser dependencies
        run: npx --no-install playwright install --with-deps chromium firefox webkit
      - name: Run browser tests
        env:
          SNUI_SNAPSHOT_VARIANT: ${{ matrix.snapshot_variant }}
        run: npm run test:browser
      - name: Upload browser report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.architecture }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: error
